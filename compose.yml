# chatahub/docker-compose.yml

services:
  app:
    build: .
    command: sh -c "rm -f tmp/pids/server.pid && ./bin/rails server -b 0.0.0.0"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    # env_file načíta API kľúče (Stripe/Twilio/weather) z .env; required:false => beží aj bez neho
    env_file:
      - path: .env
        required: false
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/chata_hub_development
      REDIS_URL: redis://redis:6379/1
      ELASTICSEARCH_URL: http://elasticsearch:9200
    # condition: service_healthy => app nabehne až keď sú závislosti reálne pripravené (nie len spustené)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  sidekiq:
    build: .
    command: bundle exec sidekiq
    volumes:
      - .:/app
    env_file:
      - path: .env
        required: false
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/chata_hub_development
      REDIS_URL: redis://redis:6379/1
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
  #    ports:
  #      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # Pevný heap strop => ES na WSL2 nezožerie všetku RAM / nepadne na OOM
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    mem_limit: 1g
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
